<!DOCTYPE html>
<html>
<head>
  <title>AI Smart Irrigation Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 10px;
      border-radius: 10px;
      display: inline-block;
      width: 200px;
    }

    .result {
      background: green;
      color: white;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>

<body>

<h1>🌱 AI Smart Irrigation Assistant</h1>

<div class="card">
  <h3>Temperature</h3>
  <p>35°C</p>
</div>

<div class="card">
  <h3>Humidity</h3>
  <p>69%</p>
</div>

<div class="card">
  <h3>Soil Moisture</h3>
  <p>60%</p>
</div>

<div class="card">
  <h3>Rainfall Probability</h3>
  <p>70%</p>
</div>

<div class="result">
  Irrigation NOT Required (Confidence: 88%)
</div>

</body>
</html>
